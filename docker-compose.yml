services:
  postgres:
    image: postgres:latest
    container_name: xmlmessage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: xmlmessage
      POSTGRES_USER: xmluser
      POSTGRES_PASSWORD: xmlpass
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
