server.port=8080
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/xmlmessage}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:xmluser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:xmlpass}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

xml.server.ban-words=classpath:ban-words.txt
springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/api-docs
